# Card Factory Configuration
# This file defines how to generate cards from a spreadsheet

# Template selection
# Use {type} to select template based on card type
template:
  pattern: "template/{type}.svg"
  default: "template/hardware.svg"

# Filter: only include rows where the column contains the specified text
filter:
  column: "type"
  contains: "hardware"

# Bindings: map SVG element IDs to spreadsheet columns
# Supported options:
#   - value: field name(s) to use, supports templates like "{field}" or "{field1}\n\n{field2}"
#   - Transform tags: [uppercase]{field}[/uppercase], [lowercase]{field}[/lowercase]
#   - Inline patterns: ${binding_id} in SVG templates (resolved from bindings)
#   - Markdown-like formatting: *bold*, !heavy! (font-weight:900), _italic_
#   - prefix: text to prepend if value is not empty
#   - attribute: for image bindings, set this to the attribute to modify (e.g., "xlink:href")
#     Images are downloaded, cached locally, and embedded as base64 blobs
bindings:
  - element_id: "name"
    value: "name"

  - element_id: "type"
    value: "[uppercase]{type}[/uppercase]"

  - element_id: "subtypes"
    value: "{subtypes}"
    prefix: " - "

  - element_id: "cost"
    value: "cost"

  - element_id: "text-body"
    value: "*{text}*\n\n_{flavor}_"

  - element_id: "illustrator"
    value: "illustrator"

  # Image binding example - downloads and embeds card illustration
  - element_id: "illustration"
    attribute: "xlink:href"
    value: "https://card-images.netrunnerdb.com/v2/xlarge/{NRDB_ID}.webp"

# Output settings
output:
  directory: "export"
  filename_pattern: "{name}.svg"
