# Card Factory Configuration
# This file defines how to generate cards from a spreadsheet

# Template selection
# Use {type} to select template based on card type
template:
  pattern: "template/{type}.svg"
  default: "template/hardware.svg"

# Filter: only include rows where the column contains the specified text
filter:
  column: "type"
  contains: "hardware"

# Bindings: map SVG element IDs to spreadsheet columns
# Supported options:
#   - source_column: spreadsheet column name
#   - prefix: text to prepend if value is not empty
#   - transform: "uppercase" or "lowercase"
bindings:
  - element_id: "name"
    source_column: "name"
    transform: "uppercase"

  - element_id: "type"
    source_column: "type"
    transform: "uppercase"

  - element_id: "subtypes"
    source_column: "subtypes"
    prefix: " - "

  - element_id: "cost"
    source_column: "cost"

  - element_id: "text-body"
    source_column: "text"

  - element_id: "copyright"
    source_column: "illustrator"

# Output settings
output:
  directory: "export"
  filename_pattern: "{name}.svg"
